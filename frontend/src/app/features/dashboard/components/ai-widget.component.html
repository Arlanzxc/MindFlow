<button
  (click)="toggleChat()"
  class="fixed bottom-6 right-6 z-50 flex h-14 w-14 items-center justify-center rounded-full bg-gradient-to-r from-indigo-500 to-purple-600 text-white shadow-[0_0_20px_rgba(79,70,229,0.4)] transition-transform hover:scale-110 focus:outline-none cursor-pointer"
>
  @if (!isOpen()) {
    <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
  }
  @if (isOpen()) {
    <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
  }
</button>

@if (isOpen()) {
  <div class="fixed bottom-24 right-6 z-50 flex h-[450px] w-80 flex-col overflow-hidden rounded-2xl border border-slate-700 bg-slate-900/95 shadow-2xl backdrop-blur-xl sm:w-96 transition-all">
    
    <div class="flex items-center justify-between border-b border-slate-800 bg-slate-900 px-4 py-3">
      <div class="flex items-center gap-2">
        <div class="h-2 w-2 rounded-full bg-emerald-400 shadow-[0_0_8px_rgba(52,211,153,0.8)] animate-pulse"></div>
        <h3 class="font-semibold text-slate-100 tracking-wide">MindFlow AI</h3>
      </div>
      <button (click)="toggleChat()" class="text-slate-400 hover:text-slate-200 cursor-pointer transition-colors">
        <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
      </button>
    </div>

    <div #chatScroll class="flex-1 overflow-y-auto p-4 space-y-4 scroll-smooth">
      @for (msg of messages(); track $index) {
        <div class="flex" [ngClass]="msg.isAi ? 'justify-start' : 'justify-end'">
          <div
            class="max-w-[85%] rounded-2xl px-4 py-2 text-sm shadow-md"
            [ngClass]="msg.isAi 
              ? 'bg-slate-800 text-slate-200 rounded-tl-sm border border-slate-700' 
              : 'bg-indigo-600 text-white rounded-tr-sm'"
          >
            {{ msg.text }}
          </div>
        </div>
      }
      
      @if (isTyping()) {
        <div class="flex justify-start">
          <div class="bg-slate-800 border border-slate-700 rounded-2xl rounded-tl-sm px-4 py-3 flex items-center gap-1.5 shadow-md">
            <div class="w-1.5 h-1.5 bg-slate-400 rounded-full animate-bounce"></div>
            <div class="w-1.5 h-1.5 bg-slate-400 rounded-full animate-bounce" style="animation-delay: 0.15s"></div>
            <div class="w-1.5 h-1.5 bg-slate-400 rounded-full animate-bounce" style="animation-delay: 0.3s"></div>
          </div>
        </div>
      }
    </div>

    <div class="border-t border-slate-800 bg-slate-900 p-3">
      <form (ngSubmit)="sendMessage()" class="flex gap-2">
        <input
          type="text"
          [(ngModel)]="newMessage"
          name="message"
          autocomplete="off"
          placeholder="Напиши 'устал' или 'совет'..."
          class="flex-1 rounded-xl border border-slate-700 bg-slate-800 px-4 py-2 text-sm text-slate-100 placeholder-slate-400 focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500 transition-all"
        />
        <button
          type="submit"
          [disabled]="!newMessage().trim() || isTyping()"
          class="flex h-[38px] w-[38px] items-center justify-center rounded-xl bg-indigo-600 text-white transition-colors hover:bg-indigo-500 disabled:opacity-50 disabled:hover:bg-indigo-600 cursor-pointer mt-[1px]"
        >
          <svg class="h-4 w-4 ml-0.5" fill="currentColor" viewBox="0 0 20 20"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"></path></svg>
        </button>
      </form>
    </div>
    
  </div>
}
