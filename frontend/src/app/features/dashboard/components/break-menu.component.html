<section
  class="rounded-3xl border border-white/10 bg-gradient-to-br from-zinc-900/90 to-slate-900/75 p-6 shadow-[0_10px_60px_rgba(0,0,0,0.45)] backdrop-blur-xl"
>
  <p class="text-xs uppercase tracking-[0.2em] text-emerald-300/80">Break Mode</p>
  <h2 class="mt-2 text-2xl font-semibold text-white">Choose Your Break Activity</h2>
  <p class="mt-1 text-sm text-slate-400">Pick the most restorative activity for this break cycle.</p>

  <div class="mt-6 grid gap-4 md:grid-cols-2">
    <button
      type="button"
      class="rounded-2xl border border-cyan-300/20 bg-cyan-500/10 p-5 text-left transition hover:bg-cyan-500/15"
      (click)="select('schulte')"
    >
      <p class="text-sm font-semibold text-cyan-100">Cognitive Training</p>
      <p class="mt-1 text-sm text-slate-300">Launch Schulte table for attention sharpening.</p>
    </button>

    <button
      type="button"
      class="rounded-2xl border border-indigo-300/20 bg-indigo-500/10 p-5 text-left transition hover:bg-indigo-500/15"
      (click)="select('eyes')"
    >
      <p class="text-sm font-semibold text-indigo-100">Eye Exercises</p>
      <p class="mt-1 text-sm text-slate-300">20-20-20 rule, blinking reset, and focus shift.</p>
    </button>

    <button
      type="button"
      class="rounded-2xl border border-amber-300/20 bg-amber-500/10 p-5 text-left transition hover:bg-amber-500/15"
      (click)="select('warmup')"
    >
      <p class="text-sm font-semibold text-amber-100">Physical Warm-up / Walk</p>
      <p class="mt-1 text-sm text-slate-300">Neck rolls, shoulder reset, or 5-minute walk.</p>
    </button>

    <button
      type="button"
      class="rounded-2xl border border-emerald-300/20 bg-emerald-500/10 p-5 text-left transition hover:bg-emerald-500/15"
      (click)="select('hobby')"
    >
      <p class="text-sm font-semibold text-emerald-100">My Custom Hobby</p>
      @if (hobby()) {
        <p class="mt-1 text-sm text-slate-200">Suggested now: <span class="font-semibold">{{ hobby() }}</span></p>
      } @else {
        <p class="mt-1 text-sm text-slate-300">No hobby set yet. Add one in Profile.</p>
      }
    </button>
  </div>
</section>
