<div class="mx-auto flex min-h-screen max-w-md items-center px-4 py-8">
  <div class="w-full rounded-xl bg-white p-6 shadow-sm ring-1 ring-slate-200">
    <h1 class="text-2xl font-semibold text-slate-900">Sign in to MindFlow</h1>
    <p class="mt-1 text-sm text-slate-600">Continue your focus sessions.</p>

    <form class="mt-6 space-y-4" [formGroup]="form" (ngSubmit)="submit()">
      <div>
        <label for="email" class="mb-1 block text-sm font-medium text-slate-700">Email</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:border-slate-500 focus:outline-none focus:ring-2 focus:ring-slate-200"
          placeholder="you@example.com"
        />
      </div>

      <div>
        <label for="password" class="mb-1 block text-sm font-medium text-slate-700">Password</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:border-slate-500 focus:outline-none focus:ring-2 focus:ring-slate-200"
          placeholder="********"
        />
      </div>

      @if (errorMessage()) {
        <p class="text-sm text-rose-600">{{ errorMessage() }}</p>
      }

      <button
        type="submit"
        [disabled]="isSubmitting()"
        class="w-full rounded-md bg-slate-900 px-4 py-2 text-sm font-medium text-white hover:bg-slate-700 disabled:cursor-not-allowed disabled:opacity-70"
      >
        {{ isSubmitting() ? 'Signing in...' : 'Sign in' }}
      </button>
    </form>

    <p class="mt-4 text-sm text-slate-600">
      New here?
      <a routerLink="/register" class="font-medium text-slate-900 underline">Create an account</a>
    </p>
  </div>
</div>
