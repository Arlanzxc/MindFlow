<div class="min-h-screen bg-slate-950 flex flex-col justify-center items-center text-white relative overflow-hidden px-4">
  <div class="absolute top-0 left-1/4 w-96 h-96 bg-indigo-600/20 rounded-full mix-blend-multiply filter blur-[128px] animate-pulse"></div>
  <div class="absolute bottom-0 right-1/4 w-96 h-96 bg-purple-600/20 rounded-full mix-blend-multiply filter blur-[128px] animate-pulse"></div>

  <div class="relative z-10 w-full max-w-md rounded-3xl bg-slate-900/60 p-8 shadow-2xl backdrop-blur-xl border border-slate-800">
    
    <div class="mb-8 text-center">
      <div class="mx-auto mb-4 flex h-12 w-12 items-center justify-center rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 shadow-[0_0_15px_rgba(79,70,229,0.5)]">
        <svg class="h-7 w-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
      </div>
      <h1 class="text-3xl font-bold tracking-tight text-white">Welcome back</h1>
      <p class="mt-2 text-sm text-slate-400">Enter your credentials to access your workspace.</p>
    </div>

    <form class="space-y-5" [formGroup]="form" (ngSubmit)="submit()">
      <div>
        <label for="email" class="mb-1.5 block text-sm font-medium text-slate-300">Email Address</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          class="w-full rounded-xl border border-slate-700 bg-slate-800/50 px-4 py-3 text-sm text-slate-100 placeholder-slate-500 focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500 transition-all"
          placeholder="you@example.com"
        />
      </div>

      <div>
        <label for="password" class="mb-1.5 block text-sm font-medium text-slate-300">Password</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          class="w-full rounded-xl border border-slate-700 bg-slate-800/50 px-4 py-3 text-sm text-slate-100 placeholder-slate-500 focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500 transition-all"
          placeholder="••••••••"
        />
      </div>

      @if (errorMessage()) {
        <div class="rounded-xl border border-rose-500/30 bg-rose-500/10 p-3 text-center text-sm text-rose-400">
          {{ errorMessage() }}
        </div>
      }

      <button
        type="submit"
        [disabled]="isSubmitting()"
        class="mt-2 w-full rounded-xl bg-gradient-to-r from-indigo-500 to-purple-600 px-4 py-3.5 text-sm font-bold text-white shadow-[0_0_20px_rgba(79,70,229,0.3)] transition-all hover:scale-[1.02] hover:shadow-[0_0_30px_rgba(79,70,229,0.5)] disabled:scale-100 disabled:opacity-70 cursor-pointer"
      >
        {{ isSubmitting() ? 'Authenticating...' : 'Sign In' }}
      </button>
    </form>

    <p class="mt-6 text-center text-sm text-slate-400">
      Don't have an account?
      <a routerLink="/register" class="font-semibold text-indigo-400 transition-colors hover:text-indigo-300">Sign up</a>
    </p>
  </div>
</div>
